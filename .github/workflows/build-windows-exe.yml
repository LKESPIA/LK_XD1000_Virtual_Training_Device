name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --clean --name LK_XD1000_Virtual_Training_Device --add-data "parameters_xd1000.json;." lk_xd1000_virtual_training_device.py

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LK_XD1000_Virtual_Training_Device_Windows_EXE
          path: dist/LK_XD1000_Virtual_Training_Device.exe
